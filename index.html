<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookmarks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-50:  #eff6ff;
      --blue-100: #dbeafe;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --gray-50:  #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-900: #111827;
      --red-500:  #ef4444;
      --red-600:  #dc2626;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
      --shadow:    0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--blue-600) 0%, var(--blue-700) 100%);
      color: #fff;
      padding: 28px 24px 24px;
      box-shadow: var(--shadow-md);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-icon {
      font-size: 2rem;
      line-height: 1;
    }
    header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -.5px; }
    header p  { font-size: .9rem; opacity: .85; margin-top: 2px; }

    /* ── Main layout ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    /* ── Controls row ── */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      font-size: 1rem;
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: .95rem;
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #searchInput:focus {
      border-color: var(--blue-400);
      box-shadow: 0 0 0 3px rgba(96,165,250,.25);
    }
    #addBtn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 11px 20px;
      background: var(--blue-600);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s, transform .1s;
    }
    #addBtn:hover  { background: var(--blue-700); }
    #addBtn:active { transform: scale(.97); }

    /* ── Category filters ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .filter-btn {
      padding: 6px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: 999px;
      background: #fff;
      color: var(--gray-600);
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover  { border-color: var(--blue-400); color: var(--blue-600); }
    .filter-btn.active {
      background: var(--blue-600);
      border-color: var(--blue-600);
      color: #fff;
    }

    /* ── Stats bar ── */
    #statsBar {
      font-size: .85rem;
      color: var(--gray-500);
      margin-bottom: 16px;
    }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow .2s, transform .2s;
      border: 1.5px solid transparent;
    }
    .card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
      border-color: var(--blue-100);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .favicon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--blue-50);
      border: 1px solid var(--blue-100);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .favicon img { width: 100%; height: 100%; object-fit: contain; }
    .card-title-wrap { flex: 1; min-width: 0; }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--gray-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-url {
      font-size: .78rem;
      color: var(--gray-400);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .card-category {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .card-notes {
      font-size: .85rem;
      color: var(--gray-600);
      line-height: 1.5;
      border-left: 3px solid var(--blue-100);
      padding-left: 10px;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 4px;
    }
    .btn-visit {
      flex: 1;
      padding: 8px;
      background: var(--blue-50);
      color: var(--blue-700);
      border: 1.5px solid var(--blue-100);
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background .2s;
    }
    .btn-visit:hover { background: var(--blue-100); }
    .btn-delete {
      padding: 8px 12px;
      background: #fff;
      color: var(--gray-400);
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-delete:hover { background: #fef2f2; color: var(--red-500); border-color: #fecaca; }

    /* ── Empty state ── */
    #emptyState {
      display: none;
      text-align: center;
      padding: 64px 16px;
      color: var(--gray-400);
    }
    #emptyState .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    #emptyState h3 { font-size: 1.1rem; color: var(--gray-500); margin-bottom: 6px; }

    /* ── Modal overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-lg);
      animation: popIn .2s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--gray-900);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--blue-400);
      box-shadow: 0 0 0 3px rgba(96,165,250,.2);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .btn-cancel {
      padding: 10px 20px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      background: #fff;
      color: var(--gray-600);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-cancel:hover { background: var(--gray-100); }
    .btn-save {
      padding: 10px 24px;
      background: var(--blue-600);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-save:hover { background: var(--blue-700); }

    /* ── Confirm dialog ── */
    .confirm-modal { max-width: 360px; }
    .confirm-modal p { color: var(--gray-600); margin-bottom: 20px; font-size: .92rem; }
    .btn-confirm-delete {
      padding: 10px 20px;
      background: var(--red-500);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-confirm-delete:hover { background: var(--red-600); }

    /* ── Dark mode ── */
    body.dark {
      background: #0f172a;
      color: #e2e8f0;
    }
    body.dark header {
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
    }
    body.dark main {}
    body.dark #searchInput {
      background: #1e293b;
      border-color: #334155;
      color: #e2e8f0;
    }
    body.dark #searchInput::placeholder { color: #64748b; }
    body.dark .filter-btn {
      background: #1e293b;
      border-color: #334155;
      color: #94a3b8;
    }
    body.dark .filter-btn:hover { border-color: var(--blue-400); color: var(--blue-400); }
    body.dark .filter-btn.active { background: var(--blue-600); border-color: var(--blue-600); color: #fff; }
    body.dark #statsBar { color: #64748b; }
    body.dark .card {
      background: #1e293b;
      border-color: #334155;
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }
    body.dark .card:hover { border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(0,0,0,.4); }
    body.dark .card-title { color: #f1f5f9; }
    body.dark .card-url   { color: #64748b; }
    body.dark .card-notes { color: #94a3b8; border-left-color: #334155; }
    body.dark .favicon    { background: #0f172a; border-color: #334155; }
    body.dark .btn-visit  { background: #0f172a; border-color: #334155; color: #93c5fd; }
    body.dark .btn-visit:hover { background: #1e3a8a; }
    body.dark .btn-delete { background: #1e293b; border-color: #334155; color: #64748b; }
    body.dark .btn-delete:hover { background: #450a0a; color: var(--red-500); border-color: #7f1d1d; }
    body.dark .btn-edit   { background: #1e293b; border-color: #334155; color: #64748b; }
    body.dark .btn-edit:hover { background: #1e3a5f; color: var(--blue-400); border-color: #1d4ed8; }
    body.dark .modal      { background: #1e293b; }
    body.dark .modal h2   { color: #f1f5f9; }
    body.dark .form-group label { color: #cbd5e1; }
    body.dark .form-group input,
    body.dark .form-group select,
    body.dark .form-group textarea {
      background: #0f172a;
      border-color: #334155;
      color: #e2e8f0;
    }
    body.dark .confirm-modal p { color: #94a3b8; }
    body.dark .btn-cancel { background: #1e293b; border-color: #334155; color: #94a3b8; }
    body.dark .btn-cancel:hover { background: #0f172a; }
    body.dark #emptyState { color: #475569; }
    body.dark #emptyState h3 { color: #64748b; }

    /* ── Dark mode toggle button ── */
    #darkToggle {
      margin-left: auto;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(255,255,255,.3);
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .2s, border-color .2s;
      white-space: nowrap;
    }
    #darkToggle:hover { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.5); }

    /* ── Edit button ── */
    .btn-edit {
      padding: 8px 12px;
      background: #fff;
      color: var(--gray-400);
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-edit:hover { background: var(--blue-50); color: var(--blue-600); border-color: var(--blue-200); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 20px 16px; }
      header h1 { font-size: 1.4rem; }
      #grid { grid-template-columns: 1fr; }
      .modal { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-icon">🔖</div>
    <div>
      <h1>My Bookmarks</h1>
      <p>Your personal link dashboard</p>
    </div>
    <button id="darkToggle" title="Toggle dark mode"><span id="darkIcon">🌙</span> <span id="darkLabel">Dark</span></button>
  </div>
</header>

<main>
  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="Search bookmarks…" />
    </div>
    <button id="addBtn">＋ Add Bookmark</button>
  </div>

  <!-- Category filter bar -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="All">All</button>
  </div>

  <!-- Stats -->
  <div id="statsBar"></div>

  <!-- Bookmark grid -->
  <div id="grid"></div>

  <!-- Empty state -->
  <div id="emptyState">
    <div class="empty-icon">📭</div>
    <h3>No bookmarks found</h3>
    <p>Try a different search or add a new bookmark.</p>
  </div>
</main>

<!-- Add Bookmark Modal -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <h2>Add Bookmark</h2>
    <div class="form-group">
      <label for="fTitle">Title <span style="color:var(--red-500)">*</span></label>
      <input id="fTitle" type="text" placeholder="e.g. GitHub" />
    </div>
    <div class="form-group">
      <label for="fUrl">URL <span style="color:var(--red-500)">*</span></label>
      <input id="fUrl" type="url" placeholder="https://example.com" />
    </div>
    <div class="form-group">
      <label for="fCat">Category <span style="color:var(--red-500)">*</span></label>
      <input id="fCat" type="text" placeholder="e.g. Dev Tools, News, Design…" list="catSuggestions" />
      <datalist id="catSuggestions"></datalist>
    </div>
    <div class="form-group">
      <label for="fNotes">Notes <span style="color:var(--gray-400);font-weight:400">(optional)</span></label>
      <textarea id="fNotes" placeholder="Any notes about this bookmark…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelAddBtn">Cancel</button>
      <button class="btn-save" id="saveBtn">Save Bookmark</button>
    </div>
  </div>
</div>

<!-- Edit Bookmark Modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h2>Edit Bookmark</h2>
    <div class="form-group">
      <label for="eTitle">Title <span style="color:var(--red-500)">*</span></label>
      <input id="eTitle" type="text" placeholder="e.g. GitHub" />
    </div>
    <div class="form-group">
      <label for="eUrl">URL <span style="color:var(--red-500)">*</span></label>
      <input id="eUrl" type="url" placeholder="https://example.com" />
    </div>
    <div class="form-group">
      <label for="eCat">Category <span style="color:var(--red-500)">*</span></label>
      <input id="eCat" type="text" placeholder="e.g. Dev Tools, News, Design…" list="editCatSuggestions" />
      <datalist id="editCatSuggestions"></datalist>
    </div>
    <div class="form-group">
      <label for="eNotes">Notes <span style="color:var(--gray-400);font-weight:400">(optional)</span></label>
      <textarea id="eNotes" placeholder="Any notes about this bookmark…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelEditBtn">Cancel</button>
      <button class="btn-save" id="updateBtn">Update Bookmark</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="overlay" id="deleteOverlay">
  <div class="modal confirm-modal">
    <h2>Delete Bookmark?</h2>
    <p id="deleteMsg">This will permanently remove the bookmark.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelDeleteBtn">Cancel</button>
      <button class="btn-confirm-delete" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<script>
  // ── Category colour palette (cycles) ──────────────────────────────────────
  const PALETTE = [
    { bg: '#dbeafe', text: '#1d4ed8' },
    { bg: '#d1fae5', text: '#065f46' },
    { bg: '#fce7f3', text: '#9d174d' },
    { bg: '#fef3c7', text: '#92400e' },
    { bg: '#ede9fe', text: '#5b21b6' },
    { bg: '#fee2e2', text: '#991b1b' },
    { bg: '#e0f2fe', text: '#075985' },
    { bg: '#f3f4f6', text: '#374151' },
  ];
  const catColor = {};
  let colorIdx = 0;
  function getColor(cat) {
    if (!catColor[cat]) {
      catColor[cat] = PALETTE[colorIdx % PALETTE.length];
      colorIdx++;
    }
    return catColor[cat];
  }

  // ── Sample bookmarks ───────────────────────────────────────────────────────
  const SAMPLES = [
    { id: 's1', title: 'GitHub', url: 'https://github.com',           category: 'Dev Tools',  notes: 'Code hosting and collaboration platform.' },
    { id: 's2', title: 'MDN Web Docs', url: 'https://developer.mozilla.org', category: 'Dev Tools', notes: 'The go-to reference for HTML, CSS and JS.' },
    { id: 's3', title: 'Hacker News', url: 'https://news.ycombinator.com',   category: 'News',      notes: 'Tech news and community discussions.' },
    { id: 's4', title: 'Figma',       url: 'https://figma.com',              category: 'Design',    notes: 'Browser-based collaborative design tool.' },
    { id: 's5', title: 'Tailwind CSS',url: 'https://tailwindcss.com',        category: 'Dev Tools',  notes: 'Utility-first CSS framework.' },
    { id: 's6', title: 'CSS Tricks',  url: 'https://css-tricks.com',         category: 'Design',    notes: 'Tips, tricks and tutorials about CSS.' },
    { id: 's7', title: 'YouTube',     url: 'https://youtube.com',            category: 'Media',     notes: 'Video streaming.' },
    { id: 's8', title: 'Wikipedia',   url: 'https://wikipedia.org',          category: 'Reference', notes: 'The free encyclopedia.' },
  ];

  // ── State ──────────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'myBookmarks_v1';
  let bookmarks = [];
  let activeCategory = 'All';
  let searchQuery = '';
  let pendingDeleteId = null;

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      bookmarks = raw ? JSON.parse(raw) : SAMPLES;
    } catch { bookmarks = SAMPLES; }
    if (!bookmarks.length) bookmarks = SAMPLES;
    // seed palette colours for existing categories
    bookmarks.forEach(b => getColor(b.category));
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
  }

  // ── Favicon helper ─────────────────────────────────────────────────────────
  function faviconEl(url) {
    try {
      const origin = new URL(url).origin;
      const img = document.createElement('img');
      img.src = `https://www.google.com/s2/favicons?domain=${origin}&sz=32`;
      img.onerror = () => { img.replaceWith(document.createTextNode('🔗')); };
      return img;
    } catch { return document.createTextNode('🔗'); }
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function filtered() {
    const q = searchQuery.toLowerCase();
    return bookmarks.filter(b => {
      const matchCat = activeCategory === 'All' || b.category === activeCategory;
      const matchQ   = !q || b.title.toLowerCase().includes(q) || b.category.toLowerCase().includes(q);
      return matchCat && matchQ;
    });
  }

  function renderFilterBar() {
    const cats = ['All', ...new Set(bookmarks.map(b => b.category))];
    const bar = document.getElementById('filterBar');
    bar.innerHTML = '';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
      btn.dataset.cat = cat;
      btn.textContent = cat;
      btn.addEventListener('click', () => {
        activeCategory = cat;
        renderFilterBar();
        renderGrid();
      });
      bar.appendChild(btn);
    });
  }

  function renderGrid() {
    const list = filtered();
    const grid = document.getElementById('grid');
    const empty = document.getElementById('emptyState');
    const stats = document.getElementById('statsBar');

    stats.textContent = `${list.length} bookmark${list.length !== 1 ? 's' : ''}${activeCategory !== 'All' ? ' in ' + activeCategory : ''}${searchQuery ? ' matching "' + searchQuery + '"' : ''}`;

    if (!list.length) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    grid.innerHTML = '';
    list.forEach(b => {
      const color = getColor(b.category);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top">
          <div class="favicon"></div>
          <div class="card-title-wrap">
            <div class="card-title" title="${esc(b.title)}">${esc(b.title)}</div>
            <div class="card-url">${esc(b.url)}</div>
          </div>
        </div>
        <span class="card-category" style="background:${color.bg};color:${color.text}">${esc(b.category)}</span>
        ${b.notes ? `<p class="card-notes">${esc(b.notes)}</p>` : ''}
        <div class="card-actions">
          <a class="btn-visit" href="${esc(b.url)}" target="_blank" rel="noopener">Visit →</a>
          <button class="btn-edit" data-id="${b.id}" title="Edit">✏️</button>
          <button class="btn-delete" data-id="${b.id}" title="Delete">🗑</button>
        </div>
      `;
      card.querySelector('.favicon').appendChild(faviconEl(b.url));
      card.querySelector('.btn-edit').addEventListener('click', () => openEditModal(b.id));
      card.querySelector('.btn-delete').addEventListener('click', () => openDeleteModal(b.id));
      grid.appendChild(card);
    });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function render() { renderFilterBar(); renderGrid(); }

  // ── Add modal ──────────────────────────────────────────────────────────────
  function openAddModal() {
    ['fTitle','fUrl','fCat','fNotes'].forEach(id => document.getElementById(id).value = '');
    updateCatSuggestions();
    document.getElementById('addOverlay').classList.add('open');
    document.getElementById('fTitle').focus();
  }
  function closeAddModal() {
    document.getElementById('addOverlay').classList.remove('open');
  }
  function updateCatSuggestions() {
    const dl = document.getElementById('catSuggestions');
    const cats = [...new Set(bookmarks.map(b => b.category))];
    dl.innerHTML = cats.map(c => `<option value="${esc(c)}">`).join('');
  }

  document.getElementById('addBtn').addEventListener('click', openAddModal);
  document.getElementById('cancelAddBtn').addEventListener('click', closeAddModal);
  document.getElementById('addOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });

  document.getElementById('saveBtn').addEventListener('click', () => {
    const title = document.getElementById('fTitle').value.trim();
    const url   = document.getElementById('fUrl').value.trim();
    const cat   = document.getElementById('fCat').value.trim();
    const notes = document.getElementById('fNotes').value.trim();

    if (!title) { alert('Please enter a title.'); return; }
    if (!url)   { alert('Please enter a URL.'); return; }
    if (!cat)   { alert('Please enter a category.'); return; }

    let finalUrl = url;
    if (!/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;

    bookmarks.unshift({ id: Date.now().toString(), title, url: finalUrl, category: cat, notes });
    getColor(cat);
    save();
    closeAddModal();
    render();
  });

  // ── Delete modal ───────────────────────────────────────────────────────────
  function openDeleteModal(id) {
    pendingDeleteId = id;
    const b = bookmarks.find(x => x.id === id);
    document.getElementById('deleteMsg').textContent = `Delete "${b ? b.title : 'this bookmark'}"? This cannot be undone.`;
    document.getElementById('deleteOverlay').classList.add('open');
  }
  function closeDeleteModal() {
    pendingDeleteId = null;
    document.getElementById('deleteOverlay').classList.remove('open');
  }

  document.getElementById('cancelDeleteBtn').addEventListener('click', closeDeleteModal);
  document.getElementById('deleteOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeDeleteModal(); });
  document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
    if (!pendingDeleteId) return;
    bookmarks = bookmarks.filter(b => b.id !== pendingDeleteId);
    save();
    closeDeleteModal();
    // reset category filter if it no longer exists
    const cats = new Set(bookmarks.map(b => b.category));
    if (activeCategory !== 'All' && !cats.has(activeCategory)) activeCategory = 'All';
    render();
  });

  // ── Search ─────────────────────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderGrid();
  });

  // ── Edit modal ─────────────────────────────────────────────────────────────
  let editingId = null;

  function openEditModal(id) {
    const b = bookmarks.find(x => x.id === id);
    if (!b) return;
    editingId = id;
    document.getElementById('eTitle').value = b.title;
    document.getElementById('eUrl').value   = b.url;
    document.getElementById('eCat').value   = b.category;
    document.getElementById('eNotes').value = b.notes || '';
    const dl = document.getElementById('editCatSuggestions');
    const cats = [...new Set(bookmarks.map(bk => bk.category))];
    dl.innerHTML = cats.map(c => `<option value="${esc(c)}">`).join('');
    document.getElementById('editOverlay').classList.add('open');
    document.getElementById('eTitle').focus();
  }
  function closeEditModal() {
    editingId = null;
    document.getElementById('editOverlay').classList.remove('open');
  }

  document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
  document.getElementById('editOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });

  document.getElementById('updateBtn').addEventListener('click', () => {
    const title = document.getElementById('eTitle').value.trim();
    const url   = document.getElementById('eUrl').value.trim();
    const cat   = document.getElementById('eCat').value.trim();
    const notes = document.getElementById('eNotes').value.trim();

    if (!title) { alert('Please enter a title.'); return; }
    if (!url)   { alert('Please enter a URL.'); return; }
    if (!cat)   { alert('Please enter a category.'); return; }

    let finalUrl = url;
    if (!/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;

    const idx = bookmarks.findIndex(b => b.id === editingId);
    if (idx !== -1) {
      bookmarks[idx] = { ...bookmarks[idx], title, url: finalUrl, category: cat, notes };
      getColor(cat);
    }
    save();
    closeEditModal();
    render();
  });

  // ── Dark mode ──────────────────────────────────────────────────────────────
  const DARK_KEY = 'myBookmarks_dark';
  let darkMode = localStorage.getItem(DARK_KEY) === '1';

  function applyDark() {
    document.body.classList.toggle('dark', darkMode);
    document.getElementById('darkIcon').textContent  = darkMode ? '☀️' : '🌙';
    document.getElementById('darkLabel').textContent = darkMode ? 'Light' : 'Dark';
    localStorage.setItem(DARK_KEY, darkMode ? '1' : '0');
  }

  document.getElementById('darkToggle').addEventListener('click', () => {
    darkMode = !darkMode;
    applyDark();
  });

  // ── Keyboard shortcuts ─────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeAddModal(); closeEditModal(); closeDeleteModal(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  });

  // ── Boot ───────────────────────────────────────────────────────────────────
  load();
  applyDark();
  render();
</script>
</body>
</html>
